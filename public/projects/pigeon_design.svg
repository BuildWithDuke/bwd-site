  <!-- Background with subtle gradient -->
  <defs
     id="defs2">
    <linearGradient
       id="bgGradient"
       x1="0%"
       y1="0%"
       x2="0%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop1" />
      <stop
         offset="100%"
         style="stop-color:#f9f9f9;stop-opacity:1"
         id="stop2" />
    </linearGradient>
    <!-- Glassmorphism effect -->
    <filter
       id="glass"
       x="-50%"
       y="-50%"
       width="200%"
       height="200%">
      <feGaussianBlur
         in="SourceGraphic"
         stdDeviation="20"
         id="feGaussianBlur2" />
      <feOffset
         dx="0"
         dy="8"
         result="offset"
         id="feOffset2" />
      <feFlood
         flood-color="rgba(255,255,255,0.8)"
         id="feFlood2" />
      <feComposite
         in="SourceGraphic"
         in2="offset"
         operator="over"
         id="feComposite2" />
    </filter>
