    </text>
    <!-- Subtle tagline -->
    <text
       x="2"
       y="34"
       style="font-weight:400;font-size:14px;font-family:'-apple-system', 'SF Pro Text', sans-serif;letter-spacing:0.2px;fill:#86868b"
